# Netlify build + functions config. The whole app (frontend + API) ships as one
# site: Next.js is the published frontend, and everything under
# netlify/functions is exposed at /api/* via the redirect below.

[build]
  command = "pnpm build"
  publish = "frontend/.next"

# Local `netlify dev`: run the Next.js frontend and proxy to it. Pinned so the
# CLI does not prompt to pick a workspace package.
[dev]
  command = "pnpm --filter frontend dev"
  framework = "next"
  targetPort = 3000
  port = 8888

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Function names can't contain slashes, so map the nested /api/auth/me path to
# the flat `auth-me` function explicitly. This must come before the /api/*
# catch-all below — Netlify uses the first matching redirect.
[[redirects]]
  from = "/api/auth/me"
  to = "/.netlify/functions/auth-me"
  status = 200

# Nested wallet paths → flat function names (same reason as auth/me above).
[[redirects]]
  from = "/api/wallet/balance"
  to = "/.netlify/functions/wallet-balance"
  status = 200

[[redirects]]
  from = "/api/wallet/fund"
  to = "/.netlify/functions/wallet-fund"
  status = 200

# Two-step non-custodial payment: prepare (build) then submit (broadcast).
[[redirects]]
  from = "/api/payments/prepare"
  to = "/.netlify/functions/payments-prepare"
  status = 200

[[redirects]]
  from = "/api/payments/submit"
  to = "/.netlify/functions/payments-submit"
  status = 200

# DeFindex vault (Stage 3): position read + two-step non-custodial deposit and
# withdraw (prepare → submit). Nested paths → flat function names.
[[redirects]]
  from = "/api/vaults/position"
  to = "/.netlify/functions/vaults-position"
  status = 200

[[redirects]]
  from = "/api/vaults/deposit/prepare"
  to = "/.netlify/functions/vaults-deposit-prepare"
  status = 200

[[redirects]]
  from = "/api/vaults/deposit/submit"
  to = "/.netlify/functions/vaults-deposit-submit"
  status = 200

[[redirects]]
  from = "/api/vaults/withdraw/prepare"
  to = "/.netlify/functions/vaults-withdraw-prepare"
  status = 200

[[redirects]]
  from = "/api/vaults/withdraw/submit"
  to = "/.netlify/functions/vaults-withdraw-submit"
  status = 200

# Frontend calls the backend at the relative path /api/*, same origin in dev and
# in production. No API URL to configure.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
